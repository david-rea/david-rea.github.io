short_bio: >-
  <p>
    I am a Ph.D. Candidate and NASA FINESST Fellow at Iowa State University, studying topics in planet formation with Dr. Jacob Simon.
  </p>
  <p>
    I use supercomputer simulations to directly model the environments around young stars, where planets are thought to form. 
    My research interests include turbulence, plasma physics, protoplanetary disk ionization, computational fluid dynamics, 
    and high-performance computing.
  </p>

